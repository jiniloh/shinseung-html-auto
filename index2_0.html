<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신승 성경 본문 HTML 생성기 2.0</title>
<link rel="stylesheet" href="index2_0.css">
</head>

<body>
<div class="container">
    <main class="app-card">
        <header class="app-header">
            <div>
                <h1 class="app-title">신승 성경 본문 HTML 생성기 2.0</h1>
                <p class="app-description">말씀 MP3 링크, 패밀리모임지 링크, 성경 본문을 입력하면 게시용 HTML을 생성합니다.</p>
            </div>
            <div class="version">v2.0</div>
        </header>

        <div class="workspace">
            <section class="section section-input" aria-labelledby="inputSectionTitle">
                <h2 id="inputSectionTitle" class="section-title">입력 (2.0 작업본)</h2>

                <div class="field">
                    <label class="field-label" for="mp3">말씀 MP3 파일명</label>
                    <input id="mp3" placeholder="260215_c.mp3">
                </div>

                <div class="field">
                    <div class="field-header">
                        <label class="field-label" for="lesson">패밀리모임지 링크</label>
                        <span class="field-help">(선택)</span>
                        <div class="tooltip-wrap" id="tooltipWrap">
                            <button type="button" id="infoBtn" class="tooltip-trigger">도움말</button>
                            <div id="helpBox" class="tooltip-box">
                                <strong>패밀리모임지 링크 복사 방법</strong><br>
                                1. 다운로드 버튼을 클릭합니다.<br>
                                2. <strong>링크 주소 복사</strong>를 선택합니다.<br>
                                <img src="guide.png" alt="패밀리모임지 링크 복사 안내">
                            </div>
                        </div>
                    </div>
                    <input id="lesson" placeholder="http://www.shinseung.or.kr/File/Download?...">
                </div>

                <div class="field field-bible">
                    <div class="field-header field-header-column">
                        <label class="field-label" for="bible">성경 본문 전체 붙여넣기</label>
                        <p class="field-help-text">직접 붙여넣어도 되고, 아래 선택창으로 개역개정 본문을 자동으로 불러올 수도 있습니다.</p>
                    </div>

                    <div class="bible-picker">
                        <div class="picker-grid">
                            <div class="picker-item picker-item-book">
                                <label class="picker-label" for="bookSelect">성경</label>
                                <select id="bookSelect"></select>
                            </div>

                            <div class="picker-item">
                                <label class="picker-label" for="chapterSelect">장</label>
                                <select id="chapterSelect"></select>
                            </div>

                            <div class="picker-item">
                                <label class="picker-label" for="verseStartSelect">시작절</label>
                                <select id="verseStartSelect"></select>
                            </div>

                            <div class="picker-item">
                                <label class="picker-label" for="verseEndSelect">끝절</label>
                                <select id="verseEndSelect"></select>
                            </div>
                        </div>

                        <div class="picker-actions">
                            <span id="bibleStatus" class="helper-message" aria-live="polite"></span>
                        </div>
                    </div>

                    <textarea id="bible" placeholder="1. 태초에 하나님이 천지를 창조하시니라
2. 땅이 혼돈하고 공허하며
3. 하나님이 이르시되 빛이 있으라"></textarea>

                    <div class="actions actions-generate">
                        <button type="button" id="generateBtn" class="button button-primary">HTML 생성 + 미리보기</button>
                    </div>
                </div>
            </section>

            <section class="section section-result" aria-labelledby="resultSectionTitle">
                <h2 id="resultSectionTitle" class="section-title">결과</h2>

                <div class="result-stack">
                    <section aria-labelledby="outputSectionTitle">
                        <div class="subsection-header">
                            <h3 id="outputSectionTitle" class="subsection-title">생성된 HTML</h3>
                            <div class="actions actions-copy">
                                <button type="button" id="copyBtn" class="button button-success">결과 HTML 복사</button>
                                <span id="copyMsg" class="copy-msg" aria-live="polite"></span>
                            </div>
                        </div>
                        <textarea id="output" class="output-area"></textarea>
                    </section>

                    <section aria-labelledby="previewSectionTitle">
                        <h3 id="previewSectionTitle" class="subsection-title">미리보기</h3>
                        <div id="preview" class="panel preview-area"></div>
                    </section>
                </div>
            </section>
        </div>
    </main>
</div>

<script src="bible_data.js"></script>
<script src="index2_0.js"></script>
</body>
</html>
